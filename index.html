<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Filmempfehlung</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body>
        <header>
            <h1>Filmempfehlung</h1>
            <p>Weißt du nicht was du als nächstes schauen sollst? Suche dir hier Inspiration!</p>
        </header>

        <main>
            <form action="cgi-bin/recs.cgi" method="GET">

                <div>
                    <label>Genre:</label>
                    <select name="genre" id="genre">
                        <option value="action">Action</option>
                        <option value="comedy">Comedy</option>
                        <option value="drama">Drama</option>
                        <option value="animationsfilm">Animationsfilm</option>
                        <option value="romance">Romance</option>
                        <option value="thriller">Thriller</option>
                        <option value="sci-fi">Sci-Fi</option>
                        <option value="dokumentation">Dokumentation</option>
                        <option value="abenteuer">Abenteuer</option>
                    </select>
                </div>

                 <div>
                    <label>Typ:</label>
                    <select name="type" id="type">
                        <option value="film">Film</option>
                        <option value="serie">Serie</option>
                        <option value="kurzfilm">Kurzfilm</option>
                    </select>
                </div>

                <div>
                    <label>Alter:</label>
                    <select name="age" id="age">
                        <option value="kids">0-12 Jahre</option>
                        <option value="teens">12-17 Jahre</option>
                        <option value="adults">18+ Jahre</option>
                    </select>
                </div>

                <div>
                    <label>Filter:</label><br>
                    <input type="checkbox" name="filter" value="trigger1"> Major Character Death<br>
                    <input type="checkbox" name="filter" value="indie"> Indie<br>
                    <input type="checkbox" name="filter" value="adapted"> Adaptation<br>
                    <input type="checkbox" name="filter" value="historisch"> Historisch<br>
                    <input type="checkbox" name="filter" value="holiday"> Festlich<br>
                    <input type="checkbox" name="filter" value="wahr"> Wahre Begebenheit<br>
                    <input type="checkbox" name="filter" value="seventies"> 70s<br>
                    <input type="checkbox" name="filter" value="eighties"> 80s<br>
                    <input type="checkbox" name="filter" value="nineties"> 90s<br>
                    <input type="checkbox" name="filter" value="y2k"> 2000er<br>
                    <input type="checkbox" name="filter" value="tens"> 2010er<br>
                    <input type="checkbox" name="filter" value="twenties"> 2020er<br>
                </div>


                <div>
                <input type="submit" value="Filme empfehlen">
                </div>
            </form>

        </main>
    <footer>
        <a href="https://github.com/Arwenius/film-recs-master#">
    </footer>
    </body>
</html>
